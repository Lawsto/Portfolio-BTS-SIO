  <link rel="stylesheet" href="css/main.css">
</head>
<body>

  <!-- Sidebar Navigation -->
  <aside class="sidebar" role="navigation" aria-label="Navigation principale">
    <div class="sidebar-header">
      <div class="logo" aria-label="Logo du site">Fouarge Etienne</div>
      <button class="sidebar-toggle" aria-label="Réduire le menu" aria-expanded="true">
        <span>☰</span>
      </button>
    </div>
    <nav class="sidebar-nav">
      <ul class="sidebar-menu">
        <li><a href="index.html">À propos</a></li>
        <li><a href="parcours.html">Mon Parcours</a></li>

        <li><a href="contact.html" class="active">Contact</a></li>
      </ul>
    </nav>
  </aside>

  <!-- Main Content -->
  <div class="main-wrapper">
    <main>
      <section class="page-section">
        <h2>Contact</h2>
        <form id="contact-form" method="POST" aria-label="Formulaire de contact">
          <div class="form-group">
            <label for="name" class="sr-only">Votre nom</label>
            <input type="text" id="name" name="name" placeholder="Votre nom" required aria-required="true">
          </div>
          <div class="form-group">
            <label for="email" class="sr-only">Votre email</label>
            <input type="email" id="email" name="email" placeholder="Votre email" required aria-required="true">
          </div>
          <div class="form-group">
            <label for="message" class="sr-only">Votre message</label>
            <textarea id="message" name="message" placeholder="Votre message" rows="5" required aria-required="true"></textarea>
          </div>
          <div id="form-message" class="form-message" role="alert" aria-live="polite"></div>
          <button type="submit" class="btn">Envoyer</button>
        </form>
      </section>
    </main>

    <footer>
      <p>&copy; 2024 Fouarge Etienne. Tous droits réservés.</p>
      <div class="footer-links">
        <a href="mentions-legales.html">Mentions légales</a>

      </div>
    </footer>

  <!-- Bouton retour en haut -->

  <script src="js/app.js" defer></script>
</body>
